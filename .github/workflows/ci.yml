name: CI

# Quality gate: lint (ESLint + Stylelint + html-validate + Prettier) and tests,
# on every push and pull request. Does NOT deploy — see deploy.yml.
on:
  push:
    branches: ['**']
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run check
