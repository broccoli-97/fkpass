name: Deploy to Cloudflare Pages

# A "formal version" = a v* tag (e.g. v1.0.0). Everyday branch pushes run CI
# (ci.yml) but never deploy. Push a tag to ship:
#   git tag v1.0.0 && git push origin v1.0.0
on:
  push:
    tags: ['v*']

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci

      - name: Lint + test (gate — never deploy a failing build)
        run: npm run check

      - name: Assemble publish directory (only the static site + Pages Functions)
        run: |
          mkdir -p dist
          cp src/*.html src/*.css src/*.js dist/
          cp -r functions dist/functions

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Adjust --project-name and --branch to match your Pages project name
          # and its production branch. FEEDBACK_KV is bound in the Cloudflare
          # dashboard (see CLOUDFLARE-SETUP.md) and persists across deploys.
          command: pages deploy dist --project-name=fkpass --branch=master --commit-dirty=true
